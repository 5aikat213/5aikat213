<svg width="800" height="220" viewBox="0 0 800 220" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="220" fill="#030810"/>
  <style>
    .edge { fill: none; stroke: #1e3a8a; stroke-width: 0.8; stroke-dasharray: 5 7; animation: dash 3s linear infinite; }
    @keyframes dash { to { stroke-dashoffset: -48; } }
    .node-ring { fill: none; animation: ripple ease-out 2.5s infinite; }
    @keyframes ripple { 0% { r: 18px; opacity: 0.8; } 100% { r: 36px; opacity: 0; } }
    .agent { animation: agentpulse ease-in-out 2s infinite alternate; }
    @keyframes agentpulse { from { opacity: 0.7; } to { opacity: 1; } }
    .packet { animation: travel linear infinite; }
    @keyframes travel { 0% { offset-distance: 0%; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { offset-distance: 100%; opacity: 0; } }
    .sig { animation: sigpulse ease-in-out 1.2s infinite alternate; }
    @keyframes sigpulse { from { opacity: 0.3; fill: #ef4444; } to { opacity: 1; fill: #fca5a5; } }
    .label { font-family: monospace; font-size: 9px; letter-spacing: 0.5px; }
    .glow1 { fill: #3b82f6; animation: agentpulse 2s 0s   infinite alternate; }
    .glow2 { fill: #f59e0b; animation: agentpulse 2s 0.5s infinite alternate; }
    .glow3 { fill: #8b5cf6; animation: agentpulse 2s 1.0s infinite alternate; }
    .glow4 { fill: #10b981; animation: agentpulse 2s 1.5s infinite alternate; }
    .glow5 { fill: #ef4444; animation: agentpulse 2s 2.0s infinite alternate; }
    .ring1 { stroke: #3b82f6; animation: ripple 2.5s 0s   infinite; }
    .ring2 { stroke: #f59e0b; animation: ripple 2.5s 0.5s infinite; }
    .ring3 { stroke: #8b5cf6; animation: ripple 2.5s 1.0s infinite; }
    .ring4 { stroke: #10b981; animation: ripple 2.5s 1.5s infinite; }
    .ring5 { stroke: #ef4444; animation: ripple 2.5s 2.0s infinite; }
    .pkt1 { fill:#60a5fa; animation: pkt1move 3.2s 0.0s linear infinite; }
    .pkt2 { fill:#fcd34d; animation: pkt2move 2.8s 0.8s linear infinite; }
    .pkt3 { fill:#a78bfa; animation: pkt3move 3.5s 1.2s linear infinite; }
    .pkt4 { fill:#34d399; animation: pkt4move 3.0s 0.4s linear infinite; }
    @keyframes pkt1move { 0%{cx:400;cy:52;opacity:0} 10%{opacity:1} 90%{opacity:1} 100%{cx:235;cy:130;opacity:0} }
    @keyframes pkt2move { 0%{cx:400;cy:52;opacity:0} 10%{opacity:1} 90%{opacity:1} 100%{cx:565;cy:130;opacity:0} }
    @keyframes pkt3move { 0%{cx:235;cy:130;opacity:0} 10%{opacity:1} 90%{opacity:1} 100%{cx:355;cy:185;opacity:0} }
    @keyframes pkt4move { 0%{cx:565;cy:130;opacity:0} 10%{opacity:1} 90%{opacity:1} 100%{cx:445;cy:185;opacity:0} }
  </style>

  <line class="edge" x1="400" y1="52"  x2="235" y2="130"/>
  <line class="edge" x1="400" y1="52"  x2="565" y2="130" style="animation-delay:-1.5s"/>
  <line class="edge" x1="235" y1="130" x2="355" y2="185" style="animation-delay:-0.8s"/>
  <line class="edge" x1="565" y1="130" x2="445" y2="185" style="animation-delay:-2.1s"/>
  <line class="edge" x1="355" y1="185" x2="445" y2="185" style="animation-delay:-1.2s"/>
  <line class="edge" x1="235" y1="130" x2="445" y2="185" style="animation-delay:-0.3s" stroke-dasharray="3 9" opacity="0.4"/>

  <circle class="node-ring ring1" cx="400" cy="52"  r="18" stroke-width="1.2"/>
  <circle class="node-ring ring2" cx="235" cy="130" r="18" stroke-width="1.2"/>
  <circle class="node-ring ring3" cx="565" cy="130" r="18" stroke-width="1.2"/>
  <circle class="node-ring ring4" cx="355" cy="185" r="18" stroke-width="1.2"/>
  <circle class="node-ring ring5" cx="445" cy="185" r="18" stroke-width="1.2"/>

  <circle class="glow1" cx="400" cy="52"  r="16"/>
  <circle class="glow2" cx="235" cy="130" r="16"/>
  <circle class="glow3" cx="565" cy="130" r="16"/>
  <circle class="glow4" cx="355" cy="185" r="16"/>
  <circle class="glow5" cx="445" cy="185" r="16"/>

  <text class="label" fill="#fff" text-anchor="middle" x="400" y="49" font-size="7">SOC</text>
  <text class="label" fill="#fff" text-anchor="middle" x="400" y="57" font-size="7">Analyst</text>
  <text class="label" fill="#fff" text-anchor="middle" x="235" y="127" font-size="7">Threat</text>
  <text class="label" fill="#fff" text-anchor="middle" x="235" y="135" font-size="7">Hunter</text>
  <text class="label" fill="#fff" text-anchor="middle" x="565" y="127" font-size="7">Investi-</text>
  <text class="label" fill="#fff" text-anchor="middle" x="565" y="135" font-size="7">gator</text>
  <text class="label" fill="#fff" text-anchor="middle" x="355" y="182" font-size="7">Re-</text>
  <text class="label" fill="#fff" text-anchor="middle" x="355" y="190" font-size="7">porter</text>
  <text class="label" fill="#fff" text-anchor="middle" x="445" y="182" font-size="7">Resp.</text>
  <text class="label" fill="#fff" text-anchor="middle" x="445" y="190" font-size="7">Taker</text>

  <circle class="pkt1" r="4" cx="400" cy="52"/>
  <circle class="pkt2" r="4" cx="400" cy="52"/>
  <circle class="pkt3" r="4" cx="235" cy="130"/>
  <circle class="pkt4" r="4" cx="565" cy="130"/>

  <text class="sig" font-family="monospace" font-size="9" x="400" y="16" text-anchor="middle" letter-spacing="2">THREAT SIGNAL ACTIVE</text>

  <text font-family="monospace" font-size="8" fill="#1e3a8a" x="10" y="215" opacity="0.7">DEEPSOC · SCALA · AKKA TYPED · CLAUDE + GPT-4o · BERLIN</text>
</svg>

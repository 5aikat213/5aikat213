<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="200" fill="#030810"/>
  <style>
    .ring { fill: none; animation: spin linear infinite; transform-origin: 400px 100px; }
    .r1  { stroke: #1e40af; stroke-width: 0.8; animation-duration: 8s; }
    .r2  { stroke: #2563eb; stroke-width: 0.7; animation-duration: 6s; }
    .r3  { stroke: #3b82f6; stroke-width: 0.6; animation-duration: 5s; }
    .r4  { stroke: #60a5fa; stroke-width: 0.5; animation-duration: 4s; }
    .r5  { stroke: #93c5fd; stroke-width: 0.4; animation-duration: 3.5s; }
    .r6  { stroke: #bfdbfe; stroke-width: 0.3; animation-duration: 3s; }
    .rr1 { animation-direction: reverse; }
    @keyframes spin { from { transform: rotateX(75deg) rotateZ(0deg); } to { transform: rotateX(75deg) rotateZ(360deg); } }
    .star { fill: #93c5fd; animation: twinkle ease-in-out infinite alternate; }
    @keyframes twinkle { from { opacity: 0.1; } to { opacity: 0.9; } }
    .label { font-family: monospace; fill: #60a5fa; font-size: 11px; letter-spacing: 3px; animation: pulse ease-in-out 3s infinite alternate; }
    @keyframes pulse { from { opacity: 0.4; } to { opacity: 1; } }
    .scan { animation: scanline 4s linear infinite; }
    @keyframes scanline { from { transform: translateX(-800px); } to { transform: translateX(800px); } }
    .orbit { fill: none; stroke-dasharray: 4 8; animation: dash 2s linear infinite; }
    @keyframes dash { to { stroke-dashoffset: -48; } }
  </style>

  <circle class="star" cx="50"  cy="30"  r="1"   style="animation-duration:2.1s;animation-delay:0s"/>
  <circle class="star" cx="130" cy="15"  r="0.8" style="animation-duration:3.2s;animation-delay:0.4s"/>
  <circle class="star" cx="210" cy="45"  r="1.2" style="animation-duration:1.8s;animation-delay:0.9s"/>
  <circle class="star" cx="290" cy="20"  r="0.7" style="animation-duration:2.7s;animation-delay:0.2s"/>
  <circle class="star" cx="510" cy="35"  r="1"   style="animation-duration:2.3s;animation-delay:1.1s"/>
  <circle class="star" cx="590" cy="12"  r="0.9" style="animation-duration:3.5s;animation-delay:0.7s"/>
  <circle class="star" cx="670" cy="50"  r="1.1" style="animation-duration:1.9s;animation-delay:0.3s"/>
  <circle class="star" cx="750" cy="25"  r="0.8" style="animation-duration:2.9s;animation-delay:1.5s"/>
  <circle class="star" cx="80"  cy="160" r="0.9" style="animation-duration:2.4s;animation-delay:0.6s"/>
  <circle class="star" cx="160" cy="175" r="1"   style="animation-duration:3.1s;animation-delay:1.0s"/>
  <circle class="star" cx="640" cy="170" r="0.8" style="animation-duration:2.6s;animation-delay:0.8s"/>
  <circle class="star" cx="720" cy="155" r="1.1" style="animation-duration:1.7s;animation-delay:0.1s"/>

  <ellipse class="ring r1"     cx="400" cy="100" rx="155" ry="42" opacity="0.6"/>
  <ellipse class="ring r2 rr1" cx="400" cy="100" rx="128" ry="35" opacity="0.65"/>
  <ellipse class="ring r3"     cx="400" cy="100" rx="104" ry="28" opacity="0.7"/>
  <ellipse class="ring r4 rr1" cx="400" cy="100" rx="82"  ry="22" opacity="0.75"/>
  <ellipse class="ring r5"     cx="400" cy="100" rx="62"  ry="17" opacity="0.8"/>
  <ellipse class="ring r6 rr1" cx="400" cy="100" rx="44"  ry="12" opacity="0.85"/>

  <ellipse class="orbit" cx="400" cy="100" rx="170" ry="46" stroke="#1e3a8a" stroke-width="0.5" opacity="0.4"/>

  <ellipse cx="400" cy="100" rx="30" ry="9" fill="#030810"/>
  <ellipse cx="400" cy="100" rx="22" ry="6" fill="#060f1e"/>

  <text class="label" x="400" y="104" text-anchor="middle">DEEPSOC</text>

  <rect class="scan" x="0" y="0" width="60" height="200" fill="url(#scangrad)" opacity="0.04"/>
  <defs>
    <linearGradient id="scangrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#3b82f6" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#3b82f6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <text font-family="monospace" font-size="9" fill="#1e40af" x="20"  y="195" letter-spacing="1" opacity="0.6">AKKA TYPED</text>
  <text font-family="monospace" font-size="9" fill="#1e40af" x="150" y="195" letter-spacing="1" opacity="0.6">SCALA 2.13</text>
  <text font-family="monospace" font-size="9" fill="#1e40af" x="280" y="195" letter-spacing="1" opacity="0.6">MULTI-AGENT</text>
  <text font-family="monospace" font-size="9" fill="#1e40af" x="430" y="195" letter-spacing="1" opacity="0.6">ANTHROPIC · OPENAI</text>
  <text font-family="monospace" font-size="9" fill="#1e40af" x="620" y="195" letter-spacing="1" opacity="0.6">BERLIN ∞</text>
</svg>
